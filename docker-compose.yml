services:
  minitwitter:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      AUTH_TOKEN_SECRET: minitwitter-docker-secret
    volumes:
      - minitwitter_data:/app/backend/data
    restart: unless-stopped

volumes:
  minitwitter_data:
